<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GOAT</title>
    <!-- Google Fonts: Poppins -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/static/styles.css?v=9">
</head>
<body class="theme-default">
    <div class="background-effects">
        <div class="stars"></div>
        <div class="stars2"></div>
        <div class="stars3"></div>
    </div>

    <div class="foreground-effects" id="foreground-effects"></div>

    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar glass-panel">
            <div class="brand">
                <div class="logo"></div>
                <h2>Cosmo</h2>
            </div>

            <div class="mood-selector">
                <h3>Space Buddy</h3>
                <div class="mood-options">
                    <button class="mood-btn active" data-mode="0">
                        <i class="fa-solid fa-rocket"></i> Astronaut
                    </button>
                    <button class="mood-btn" data-mode="1">
                        <i class="fa-solid fa-face-angry"></i> Alien
                    </button>
                    <button class="mood-btn" data-mode="2">
                        <i class="fa-solid fa-robot"></i> Bot
                    </button>
                    <button class="mood-btn" data-mode="3">
                        <i class="fa-solid fa-moon"></i> Moon
                    </button>
                </div>
            </div>

            <button id="reset-btn" class="action-btn">
                <i class="fa-solid fa-rotate-right"></i> Reset Session
            </button>
        </aside>

        <!-- Main Chat Area -->
        <main class="chat-area glass-panel">
            <header class="chat-header">
                <button id="mobile-menu-btn" class="mobile-menu-btn">
                    <i class="fa-solid fa-bars"></i>
                </button>
                <div class="current-persona">
                    <div class="avatar status-indicator"></div>
                    <div>
                        <h3 id="header-title">Cosmo Buddy</h3>
                        <p id="header-status">Ready for launch! 🚀</p>
                    </div>
                </div>
            </header>

            <div class="chat-messages" id="chat-messages">
                <!-- Welcome Message -->
                <div class="message bot-message intro-animation">
                    <div class="message-avatar">
                        <i class="fa-solid fa-robot"></i>
                    </div>
                    <div class="message-content">
                        <p>Hi there! Cosmo Buddy is ready for launch! 🚀 How can I help?</p>
                    </div>
                </div>
            </div>

            <div class="chat-input-container">
                <form id="chat-form">
                    <input type="text" id="user-input" placeholder="Message Cosmo..." autocomplete="off">
                    <button type="submit" id="send-btn" disabled>
                        <i class="fa-solid fa-paper-plane"></i>
                    </button>
                </form>
            </div>
        </main>
    </div>

    <script src="/static/app.js?v=9"></script>
</body>
</html>
